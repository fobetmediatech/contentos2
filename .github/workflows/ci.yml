name: CI
on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck app
        run: bunx tsc -b

      - name: Typecheck api
        run: bunx tsc -p api/tsconfig.json

      - name: Lint
        run: bunx eslint .

      - name: Test
        run: bun run test
